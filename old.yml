# This is a basic workflow to help you get started with Actions

name: flom_v1 CI dev2

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "flom_v1_development" branch
  push:
    branches: [ "flom/development" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: 
      - Base-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          clean: false

      - name: Set PM2_HOME environment variable
        run: echo "PM2_HOME=/shared/pm2daemon" >> $GITHUB_ENV
        
      - name: Set NVM and Node version
        uses: actions/setup-node@v3
        with:
          node-version: 14.19.0
      
      - name: Cache Node.js dependencies
        uses: actions/cache@v3
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list

      # Runs a set of commands using the runners shell
      - name: Install dependencies if changes are present and Reload pm2
        run: |
          npm install
          pm2 list
          pm2 reload API-dev
          pm2 reload API-dev-sockets
          pm2 reload bonus-consumer
          
